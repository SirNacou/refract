name: refract

services:
  refract-caddy:
    container_name: refract-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrations:
    container_name: refract-migrations
    build:
      context: .
      dockerfile: Dockerfile.migrations
    env_file:
      - config.env
      - secrets.env
    depends_on:
      refract-postgres:
        condition: service_healthy
      refract-clickhouse:
        condition: service_healthy
    restart: on-failure

  migrations-drizzle:
    container_name: refract-migrations-drizzle
    build:
      context: .
      dockerfile: Dockerfile.migrations.drizzle
    env_file:
      - config.env
      - secrets.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      refract-postgres:
        condition: service_healthy
    restart: on-failure

  refract-frontend:
    container_name: refract-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      additional_contexts:
        root: .
    env_file:
      - config.env
      - secrets.env
    environment:
      WDS_SOCKET_PORT: "3000"
      WDS_SOCKET_HOST: "localhost"
      FAST_REFRESH: "true"
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "3000"
      WATCHPACK_POLLING: true
      NODE_ENV: development
      PORT: 3000
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          initial_sync: true
          ignore:
            - node_modules
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/bun.lock
          action: rebuild
    depends_on:
      migrations:
        condition: service_completed_successfully
      migrations-drizzle:
        condition: service_completed_successfully
      refract-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  refract-api:
    container_name: refract-api
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: api
    env_file:
      - config.env
      - secrets.env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/api:/app/cmd/api
      - ./api/cmd/healthcheck-api:/app/cmd/healthcheck-api
    depends_on:
      refract-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  refract-redirector:
    container_name: refract-redirector
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: redirector
    env_file:
      - config.env
      - secrets.env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/redirector:/app/cmd/redirector
      - ./api/cmd/healthcheck-redirector:/app/cmd/healthcheck-redirector
    depends_on:
      refract-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  refract-worker:
    container_name: refract-worker
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: worker
    env_file:
      - config.env
      - secrets.env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/worker:/app/cmd/worker
      - ./api/cmd/healthcheck-worker:/app/cmd/healthcheck-worker
    depends_on:
      refract-valkey:
        condition: service_healthy
      refract-clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  refract-postgres:
    container_name: refract-postgres
    image: postgres:18-alpine
    env_file:
      - secrets.env
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  refract-valkey:
    container_name: refract-valkey
    image: valkey/valkey-bundle:9-alpine
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5

  refract-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: refract-clickhouse-server
    env_file:
      - config.env
      - secrets.env
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  valkeydata:
  ch_data:
  ch_logs:
  caddy_data:
  caddy_config:
