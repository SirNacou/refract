name: refract

services:
  caddy:
    container_name: refract-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrations:
    container_name: refract-migrations
    build:
      context: .
      dockerfile: Dockerfile.migrations
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: on-failure

  migrations-drizzle:
    container_name: refract-migrations-drizzle
    build:
      context: .
      dockerfile: Dockerfile.migrations.drizzle
    env_file:
      - .env
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    container_name: refract-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      additional_contexts:
        root: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      WDS_SOCKET_PORT: "3000"
      WDS_SOCKET_HOST: "localhost"
      FAST_REFRESH: "true"
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "3000"
      WATCHPACK_POLLING: true
      NODE_ENV: development
      PORT: 3000
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          initial_sync: true
          ignore:
            - node_modules
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/bun.lock
          action: rebuild
    depends_on:
      migrations:
        condition: service_completed_successfully
      migrations-drizzle:
        condition: service_completed_successfully
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    container_name: refract-api
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: api
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/api:/app/cmd/api
      - ./api/cmd/healthcheck-api:/app/cmd/healthcheck-api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  redirector:
    container_name: refract-redirector
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: redirector
    ports:
      - "4000:8080"
    env_file:
      - .env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/redirector:/app/cmd/redirector
      - ./api/cmd/healthcheck-redirector:/app/cmd/healthcheck-redirector
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    container_name: refract-worker
    build:
      context: ./api
      dockerfile: Dockerfile.dev
      target: worker
    env_file:
      - .env
    volumes:
      - ./api/internal:/app/internal
      - ./api/cmd/worker:/app/cmd/worker
      - ./api/cmd/healthcheck-worker:/app/cmd/healthcheck-worker
    depends_on:
      valkey:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    container_name: refract-postgres
    image: postgres:18-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    container_name: refract-valkey
    image: valkey/valkey-bundle:9-alpine
    ports:
      - "6379:6379"
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: refract-clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9009:9009"
    env_file:
      - .env
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE_NAME:-refract}
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  valkeydata:
  ch_data:
  ch_logs:
  caddy_data:
  caddy_config:
