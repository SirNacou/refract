name: refract

services:
  refract-caddy:
    container_name: refract-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrations:
    container_name: refract-migrations
    image: ghcr.io/sirnacou/refract/migrations:latest
    env_file:
      - .env
    depends_on:
      refract-postgres:
        condition: service_healthy
      refract-clickhouse:
        condition: service_healthy
    restart: on-failure

  migrations-drizzle:
    container_name: refract-migrations-drizzle
    image: ghcr.io/sirnacou/refract/migrations-drizzle:latest
    env_file:
      - .env
    depends_on:
      migrations:
        condition: service_completed_successfully
      refract-postgres:
        condition: service_healthy
    restart: on-failure

  refract-frontend:
    container_name: refract-frontend
    image: ghcr.io/sirnacou/refract/frontend:latest
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      migrations:
        condition: service_completed_successfully
      migrations-drizzle:
        condition: service_completed_successfully
      refract-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  refract-api:
    container_name: refract-api
    image: ghcr.io/sirnacou/refract/api:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      refract-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  refract-redirector:
    container_name: refract-redirector
    image: ghcr.io/sirnacou/refract/redirector:latest
    ports:
      - "4000:8080"
    env_file:
      - .env
    depends_on:
      refract-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  refract-worker:
    container_name: refract-worker
    image: ghcr.io/sirnacou/refract/worker:latest
    env_file:
      - .env
    depends_on:
      refract-valkey:
        condition: service_healthy
      refract-clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    container_name: refract-postgres
    image: postgres:18-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    container_name: refract-valkey
    image: valkey/valkey-bundle:9-alpine
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning"
    volumes:
      - valkeydata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: refract-clickhouse-server
    env_file:
      - .env
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  valkeydata:
  ch_data:
  ch_logs:
  caddy_data:
  caddy_config:
